<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Your AI Receptionist sign-in code</title>
</head>
<body style="margin:0;padding:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#111;">
<div style="max-width:480px;margin:40px auto;padding:32px 24px;background:#ffffff;border:1px solid #e5e5e5;border-radius:16px;">
  <p style="margin:0 0 8px 0;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#737373;">
    AI Receptionist · operator sign-in
  </p>
  <h1 style="margin:0 0 16px 0;font-size:20px;font-weight:600;letter-spacing:-.01em;color:#0a0a0a;">
    Your one-time sign-in code
  </h1>
  <p style="margin:0 0 24px 0;font-size:14px;line-height:1.55;color:#404040;">
    Paste this code into the sign-in form. It expires in one hour and can only be used once.
  </p>
  <div style="margin:0 0 28px 0;padding:20px 24px;background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;text-align:center;">
    <p style="margin:0;font-family:'SF Mono',Menlo,Monaco,Consolas,monospace;font-size:32px;font-weight:600;letter-spacing:.4em;color:#0a0a0a;">
      {{ .Token }}
    </p>
  </div>
  <p style="margin:0 0 4px 0;font-size:12px;line-height:1.55;color:#737373;">
    If you didn&apos;t request this, you can safely ignore this email.
  </p>
</div>
</body>
</html>
