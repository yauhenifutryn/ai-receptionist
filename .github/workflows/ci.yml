name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          standalone: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `pnpm verify` is the canonical local + CI gate. Sequence:
      #   format:check -> contracts build -> backend build -> typecheck
      #   -> lint -> test -> web build -> verify-rules.sh
      # Keep CI in lockstep with local by invoking the same script.
      - name: Verify
        run: pnpm verify
